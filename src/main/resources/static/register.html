<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">User Registration</h2>

    <div class="card p-4 mx-auto" style="max-width: 420px;">
        <input id="name" class="form-control mb-3" placeholder="Full Name">
        <input id="email" class="form-control mb-3" placeholder="Email">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-success w-100 mb-2" onclick="registerUser()">Register</button>
        <a href="login.html" class="btn btn-outline-primary w-100">Go to Login</a>
    </div>
</div>

<script>
function registerUser() {
    fetch("/api/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Registration failed");
        }
        return res.json();
    })
    .then(data => {
        alert("Registration successful");
        window.location = "login.html";
    })
    .catch(() => alert("Email may already exist"));
}
</script>

</body>
</html>
