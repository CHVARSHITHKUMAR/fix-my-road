<!DOCTYPE html>
<html>

<head>

<title>Road Issues Dashboard</title>
<div class="row mt-4">

<div class="col-md-3">
<div class="card text-white bg-primary text-center p-3">
<h4>Total Issues</h4>
<h2 id="totalIssues">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card text-white bg-danger text-center p-3">
<h4>Pending</h4>
<h2 id="pendingIssues">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card text-white bg-warning text-center p-3">
<h4>In Progress</h4>
<h2 id="progressIssues">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card text-white bg-success text-center p-3">
<h4>Fixed</h4>
<h2 id="fixedIssues">0</h2>
</div>
</div>

</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div class="container mt-3">

<div class="d-flex justify-content-between">

<h2>Reported Road Issues</h2>

<button class="btn btn-danger" onclick="logout()">Logout</button>

</div>

<div id="map" style="height:400px;margin-top:20px"></div>

<table class="table table-bordered mt-4">

<thead class="table-primary">

<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Status</th>
<th>Priority</th>
<th>Reports</th>
<th>Image</th>
<th>Action</th>
</tr>

</thead>

<tbody id="complaintTable"></tbody>

</table>

</div>

<script>

let role = localStorage.getItem("userRole");

if(!role){
alert("Please login first");
window.location="login.html";
}

let email = localStorage.getItem("userEmail");

if(!role){
alert("Please login first");
window.location="login.html";
}

let map = L.map("map").setView([20.5937,78.9629],5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

function loadComplaints(){

let url="";

if(role==="ADMIN"){
url="/api/complaints";
}else{
url="/api/complaints/user/"+email;
}

fetch(url)

.then(res=>res.json())

.then(data=>{

let rows="";

data.forEach(c=>{

let marker=L.marker([c.latitude,c.longitude]).addTo(map);

marker.bindPopup(
"<b>"+c.title+"</b><br>"+
c.description+
"<br>Status: "+c.status+
"<br><img src='"+c.imageUrl+"' width='120'>"
);

rows+=`

<tr>

<td>${c.id}</td>

<td>${c.title}</td>

<td>${c.description}</td>

<td>${c.status}</td>
<td>${c.priorityScore}</td>
<td>${c.reportCount}</td>

<td>
<img src="${c.imageUrl}" width="100">
</td>

<td>

${role==="ADMIN" ? `
<button class="btn btn-warning btn-sm" onclick="updateStatus(${c.id},'In Progress')">Start</button>

<button class="btn btn-success btn-sm" onclick="updateStatus(${c.id},'Fixed')">Fix</button>
` : "-"}

</td>

</tr>

`;

});

document.getElementById("complaintTable").innerHTML=rows;

});

}

function updateStatus(id,status){

fetch(`/api/complaints/updateStatus/${id}?status=${status}`,{

method:"PUT"

})

.then(res=>res.json())

.then(()=>{

alert("Status updated");

location.reload();

});

}

function logout(){

localStorage.clear();

window.location="login.html";

}

loadComplaints();
function loadStats(){

fetch("/api/complaints/stats/total")
.then(res=>res.text())
.then(data=>{
document.getElementById("totalIssues").innerText=data;
});

fetch("/api/complaints/stats/pending")
.then(res=>res.text())
.then(data=>{
document.getElementById("pendingIssues").innerText=data;
});

fetch("/api/complaints/stats/progress")
.then(res=>res.text())
.then(data=>{
document.getElementById("progressIssues").innerText=data;
});

fetch("/api/complaints/stats/fixed")
.then(res=>res.text())
.then(data=>{
document.getElementById("fixedIssues").innerText=data;
});

}
loadStats();

</script>

</body>

</html>
