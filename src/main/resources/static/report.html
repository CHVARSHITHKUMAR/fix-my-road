<!DOCTYPE html>
<html>

<head>

<title>Report Road Issue</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between">

<h2>Report Road Problem</h2>

<button class="btn btn-danger" onclick="logout()">Logout</button>

</div>

<div class="card p-4 mt-3">

<div class="mb-3">
<label class="form-label">Title</label>
<input id="title" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea id="desc" class="form-control"></textarea>
<label class="form-label mt-3">Pothole Severity</label>

<select id="severity" class="form-control">
<option value="1">Small</option>
<option value="2">Medium</option>
<option value="3">Severe</option>
</select>

<label class="form-label mt-3">Traffic Level</label>

<select id="traffic" class="form-control">
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Upload Image</label>
<input type="file" id="image" class="form-control">
</div>

<p class="mt-3"><b>Click on the map to mark road damage location</b></p>

<div id="map" style="height:400px"></div>

<button class="btn btn-primary mt-3" onclick="submitIssue()">Submit Issue</button>

</div>

</div>

<script>

let role = localStorage.getItem("userRole");

if(!role){
alert("Please login first");
window.location="login.html";
}

let lat = 0;
let lng = 0;

let map = L.map("map").setView([20.5937,78.9629],5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let marker;

map.on("click",function(e){

lat = e.latlng.lat;
lng = e.latlng.lng;

if(marker){
map.removeLayer(marker);
}

marker = L.marker([lat,lng]).addTo(map);

});

function submitIssue(){

let email = localStorage.getItem("userEmail");

if(!email){
alert("User not logged in");
return;
}

let imageInput = document.getElementById("image");

if(imageInput.files.length === 0){
alert("Please select an image");
return;
}

let formData = new FormData();

formData.append("title",document.getElementById("title").value);
formData.append("description",document.getElementById("desc").value);
formData.append("latitude",lat);
formData.append("longitude",lng);
formData.append("image",imageInput.files[0]);
formData.append("userEmail",email);
formData.append("severity",document.getElementById("severity").value);
formData.append("trafficLevel",document.getElementById("traffic").value);

fetch("/api/complaints/report",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{
alert("Issue reported successfully");
window.location="dashboard.html";
})
.catch(err=>{
console.error(err);
alert("Error submitting complaint");
});

}

function logout(){

localStorage.clear();

window.location="login.html";

}

</script>

</body>

</html>
