<!DOCTYPE html>
<html>

<head>

<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container text-center mt-5">

<h1 class="mb-5">Fix My Road</h1>

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card p-4 shadow">

<h4>Report Road Issue</h4>

<p>Report potholes or road damage.</p>

<a href="report.html" class="btn btn-primary">Report Issue</a>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 shadow">

<h4>View My Issues</h4>

<p>Track complaints you reported.</p>

<a href="dashboard.html" class="btn btn-success">My Issues</a>

</div>

</div>

</div>

<button class="btn btn-danger mt-5" onclick="logout()">Logout</button>

</div>

<script>

let role = localStorage.getItem("userRole");

if(!role){
window.location="login.html";
}

function logout(){
localStorage.clear();
window.location="login.html";
}

</script>

</body>

</html>
